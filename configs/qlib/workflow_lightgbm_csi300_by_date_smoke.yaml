qlib_init:
    provider_uri: "C:/aicoding/Stock_benchmark/data/processed/cn_a_share/csi300_by_date_smoke/qlib_bin_numeric"
    region: cn
market: &market csi300
data_handler_config: &data_handler_config
    start_time: 2024-01-02
    end_time: 2024-01-10
    fit_start_time: 2024-01-02
    fit_end_time: 2024-01-05
    instruments: *market
    data_loader:
        class: QlibDataLoader
        kwargs:
            config:
                feature:
                    - [
                        "$open",
                        "$high",
                        "$low",
                        "$close",
                        "$pre_close",
                        "$volume",
                        "$amount",
                        "$change",
                        "$pct_chg",
                        "$turnover_rate",
                        "$volume_ratio",
                        "$pe",
                        "$pb",
                        "$total_mv",
                        "$circ_mv",
                        "$factor"
                      ]
                    - [
                        "open",
                        "high",
                        "low",
                        "close",
                        "pre_close",
                        "volume",
                        "amount",
                        "change",
                        "pct_chg",
                        "turnover_rate",
                        "volume_ratio",
                        "pe",
                        "pb",
                        "total_mv",
                        "circ_mv",
                        "factor"
                      ]
                label:
                    - ["Ref($close, -2) / Ref($close, -1) - 1"]
                    - ["LABEL0"]
            freq: day
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.9
            learning_rate: 0.1
            subsample: 0.9
            max_depth: 4
            num_leaves: 8
            num_threads: 4
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.data.dataset.handler
                kwargs: *data_handler_config
            segments:
                train: [2024-01-02, 2024-01-05]
                valid: [2024-01-05, 2024-01-05]
                test: [2024-01-08, 2024-01-10]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              model: <MODEL>
              dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              ana_long_short: False
              ann_scaler: 252
